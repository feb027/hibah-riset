# S1 Quantitative Evaluation Config (Large Tier)
# S1 quant is a real benchmark. We measure mAP on a labelled dataset.
# Dataset: INRIA Person (Pedestrian).
# Metric: mAP@0.5:0.95.
# Target: Compare Large-tier YOLO models vs RT-DETR.
config:
  dataset: inria
  metrics:
    - mAP
    - AP50
    - AP75
  detectors:
    - yolov10l
    - yolo26l
    - yolov11l
    - rtdetr-l
  confidence_threshold: 0.25
  iou_threshold: 0.5
  output_dir: experiments/s1_quant_large