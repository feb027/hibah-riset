# S1 Quantitative Evaluation Config (INRIA)
# S1 quant is a real benchmark. We measure mAP on a labelled dataset.
# Dataset: INRIA Person (Pedestrian).
# Metric: mAP@0.5:0.95.
# Target: Compare YOLOv10 vs YOLO26 vs YOLOv11.
config:
  dataset: inria
  metrics:
    - mAP
    - AP50
    - AP75
  detectors:
    - yolov10n
    - yolo26n
    - yolov11n
  confidence_threshold: 0.25
  iou_threshold: 0.5
  output_dir: experiments/s1_quant_inria